<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJF Automáticos | Câmbio Automático em Maringá</title>
  <meta name="description" content="Especialistas em câmbio automático automotiva em Maringá e região." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    .header-inner{
      width:min(100% - 48px, 1460px) !important;
      min-height:98px !important;
      gap:20px !important;
    }

    .brand-logo{
      width:78px !important;
      height:auto !important;
      object-fit:contain !important;
      display:block !important;
    }

    .desktop-nav{
      gap:42px !important;
    }

    .header-cta{
      min-width:305px !important;
      min-height:70px !important;
      padding:0 30px !important;
      font-size:1.9rem !important;
    }

    .whatsapp-icon{
      width:28px !important;
      height:28px !important;
    }

    .hero-content{
      width:min(100% - 48px, 1460px) !important;
      min-height:calc(100vh - 98px) !important;
      padding-top:118px !important;
      padding-bottom:30px !important;
      display:flex !important;
      align-items:flex-start !important;
      justify-content:flex-start !important;
    }

    .hero-card{
      width:850px !important;
      min-height:610px !important;
      margin-left:8px !important;
      margin-top:46px !important;
      padding:78px 46px 54px !important;
      border-radius:30px !important;
      display:flex !important;
      flex-direction:column !important;
      justify-content:flex-start !important;
    }

    .hero-title-desktop,
    .hero-title-mobile{
      margin:0 !important;
      text-transform:uppercase !important;
      font-family:"Teko", sans-serif !important;
      font-weight:600 !important;
      line-height:0.93 !important;
      letter-spacing:0 !important;
    }

    .hero-title-desktop{
      display:block !important;
      font-size:50px !important;
      max-width:700px !important;
    }

    .hero-title-mobile{
      display:none !important;
    }

    .hero-title-desktop .green,
    .hero-title-mobile .green{
      color:#19f000 !important;
    }

    .hero-cta{
      margin-top:64px !important;
      width:695px !important;
      min-height:124px !important;
      font-size:3.2rem !important;
      padding:0 24px !important;
      align-self:flex-start !important;
    }

    @media (max-width: 991px){
      .header-inner{
        width:min(100% - 26px, 100%) !important;
        min-height:86px !important;
      }

      .brand-logo{
        width:58px !important;
      }

      .header-cta{
        min-width:228px !important;
        min-height:56px !important;
        padding:0 18px !important;
        font-size:1.35rem !important;
      }

      .hero-content{
        width:min(100% - 26px, 100%) !important;
        min-height:auto !important;
        padding-top:108px !important;
        padding-bottom:20px !important;
        justify-content:center !important;
      }

      .hero-card{
        width:min(100%, 760px) !important;
        min-height:auto !important;
        margin-left:0 !important;
        margin-top:22px !important;
        padding:46px 28px 34px !important;
      }

      .hero-title-desktop{
        font-size:38px !important;
        max-width:100% !important;
      }

      .hero-cta{
        width:min(100%, 520px) !important;
        min-height:88px !important;
        font-size:2.2rem !important;
        margin-top:32px !important;
      }
    }

    @media (max-width: 767px){
      .header-inner{
        width:calc(100% - 22px) !important;
        min-height:82px !important;
        gap:10px !important;
      }

      .brand-logo{
        width:54px !important;
      }

      .header-cta{
        min-width:208px !important;
        min-height:52px !important;
        padding:0 18px !important;
        font-size:1.2rem !important;
      }

      .whatsapp-icon{
        width:22px !important;
        height:22px !important;
      }

      .hero-content{
        width:calc(100% - 22px) !important;
        padding-top:108px !important;
        padding-bottom:16px !important;
        justify-content:center !important;
        align-items:flex-start !important;
      }

      .hero-card{
        width:min(100%, 780px) !important;
        min-height:705px !important;
        margin:22px auto 0 !important;
        padding:48px 28px 34px !important;
        border-radius:24px !important;
      }

      .hero-title-desktop{
        display:none !important;
      }

      .hero-title-mobile{
        display:block !important;
        font-size:30px !important;
        max-width:100% !important;
      }

      .hero-cta{
        width:100% !important;
        min-height:82px !important;
        margin-top:42px !important;
        font-size:1.7rem !important;
        padding:0 16px !important;
      }
    }
  </style>
</head>
<body>
  <header class="site-header" id="topo">
    <div
      class="header-inner"
      style="
        width:min(100% - 48px, 1460px);
        margin:0 auto;
        min-height:98px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:20px;
      "
    >
      <a
        href="#topo"
        class="brand"
        aria-label="AJF Automáticos - Início"
        style="display:flex; align-items:center; flex:0 0 auto;"
      >
        <img
          src="assets/logo.webp"
          alt="Logo AJF Automáticos"
          class="brand-logo"
          style="width:78px; height:auto; object-fit:contain; display:block;"
        />
      </a>

      <nav
        class="desktop-nav"
        aria-label="Menu principal"
        style="
          display:flex;
          align-items:center;
          justify-content:center;
          gap:42px;
          flex:1 1 auto;
          margin:0;
        "
      >
        <a href="#home" class="active">Home</a>
        <a href="#sobre">Sobre Nós</a>
        <a href="#servicos">Serviços</a>
        <a href="#cases">Cases de Sucesso</a>
      </nav>

      <div
        class="header-actions"
        style="
          display:flex;
          align-items:center;
          gap:16px;
          flex:0 0 auto;
        "
      >
        <a
          href="https://wa.me/5544999999999?text=Ol%C3%A1%2C%20quero%20agendar%20minha%20revis%C3%A3o."
          class="contact-button header-cta"
          aria-label="Entrar em contato pelo WhatsApp"
          style="
            min-width:305px;
            min-height:70px;
            padding:0 30px;
            font-size:1.9rem;
          "
        >
          <span>Entra em Contato</span>
          <img
            src="assets/whatsapp-icon.webp"
            alt="WhatsApp"
            class="whatsapp-icon"
            style="width:28px; height:28px;"
          />
        </a>

        <button
          class="menu-toggle"
          id="menuToggle"
          aria-label="Abrir menu"
          aria-expanded="false"
          aria-controls="mobileMenu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <nav class="mobile-nav" aria-label="Menu mobile">
        <a href="#home">Home</a>
        <a href="#sobre">Sobre Nós</a>
        <a href="#servicos">Serviços</a>
        <a href="#cases">Cases de Sucesso</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" id="home">
      <picture class="hero-bg">
        <source media="(max-width: 767px)" srcset="assets/hero-mobile.webp" />
        <img src="assets/hero-desktop.webp" alt="Carro esportivo verde em ambiente urbano noturno" />
      </picture>

      <div class="hero-overlay"></div>

      <div
        class="hero-content"
        style="
          width:min(100% - 48px, 1460px);
          margin:0 auto;
          min-height:calc(100vh - 98px);
          padding-top:118px;
          padding-bottom:30px;
          position:relative;
          z-index:2;
          display:flex;
          align-items:flex-start;
          justify-content:flex-start;
        "
      >
        <div
          class="hero-card"
          style="
            width:850px;
            min-height:610px;
            margin-left:8px;
            margin-top:46px;
            padding:78px 46px 54px;
            border-radius:30px;
            display:flex;
            flex-direction:column;
            justify-content:flex-start;
          "
        >
          <h1 class="hero-title-desktop">
            ESPECIALISTAS EM <span class="green">CÂMBIO</span><br>
            <span class="green">AUTOMÁTICO</span> AUTOMOTIVA<br>
            EM MARINGÁ E REGIÃO!
          </h1>

          <h1 class="hero-title-mobile">
            ESPECIALISTAS<br>
            EM <span class="green">CÂMBIO</span><br>
            <span class="green">AUTOMÁTICO</span><br>
            AUTOMOTIVA<br>
            EM MARINGÁ E<br>
            REGIÃO!
          </h1>

          <a
            href="https://wa.me/5544999999999?text=Ol%C3%A1%2C%20quero%20agendar%20minha%20revis%C3%A3o."
            class="contact-button hero-cta"
            aria-label="Agendar revisão agora"
            style="
              margin-top:64px;
              width:695px;
              min-height:124px;
              font-size:3.2rem;
              padding:0 24px;
              align-self:flex-start;
            "
          >
            <span>AGENDA SUA REVISÃO AGORA</span>
          </a>
        </div>
      </div>
    </section>

    <section id="sobre" class="spacer-section" aria-hidden="true"></section>
    <section id="servicos" class="spacer-section" aria-hidden="true"></section>
    <section id="cases" class="spacer-section" aria-hidden="true"></section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
