<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJF Automáticos | Câmbio Automático em Maringá</title>
  <meta name="description" content="Especialistas em câmbio automático automotiva em Maringá e região." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    .header-inner{
      width:min(100% - 48px, 1380px) !important;
      min-height:96px !important;
      gap:20px !important;
    }

    .brand-logo{
      width:74px !important;
      height:auto !important;
      object-fit:contain !important;
      display:block;
    }

    .desktop-nav{
      gap:34px !important;
    }

    .header-cta{
      min-width:290px !important;
      min-height:68px !important;
      padding:0 28px !important;
      font-size:1.8rem !important;
    }

    .whatsapp-icon{
      width:28px !important;
      height:28px !important;
    }

    .hero-content{
      width:min(100% - 48px, 1380px) !important;
      min-height:calc(100vh - 96px) !important;
      padding-top:120px !important;
      padding-bottom:40px !important;
      display:flex !important;
      align-items:center !important;
      justify-content:flex-start !important;
    }

    .hero-card{
      width:min(56vw, 860px) !important;
      min-height:520px !important;
      margin-left:0 !important;
      margin-top:0 !important;
      padding:58px 44px 50px !important;
      border-radius:26px !important;
    }

    .hero-card h1{
      max-width:700px !important;
      font-size:56px !important;
      line-height:0.95 !important;
      letter-spacing:0 !important;
      text-transform:uppercase !important;
      margin:0 !important;
    }

    .hero-cta{
      margin-top:46px !important;
      width:min(100%, 610px) !important;
      min-height:104px !important;
      font-size:2.8rem !important;
      padding:0 28px !important;
    }

    @media (max-width: 991px){
      .header-inner{
        width:min(100% - 28px, 100%) !important;
        min-height:88px !important;
        gap:12px !important;
      }

      .brand-logo{
        width:62px !important;
      }

      .header-cta{
        min-width:230px !important;
        min-height:58px !important;
        padding:0 22px !important;
        font-size:1.45rem !important;
      }

      .whatsapp-icon{
        width:24px !important;
        height:24px !important;
      }

      .hero-content{
        width:min(100% - 28px, 100%) !important;
        min-height:auto !important;
        padding-top:130px !important;
        padding-bottom:24px !important;
        justify-content:center !important;
        align-items:flex-start !important;
      }

      .hero-card{
        width:100% !important;
        max-width:780px !important;
        min-height:auto !important;
        padding:44px 30px 38px !important;
        border-radius:24px !important;
      }

      .hero-card h1{
        max-width:100% !important;
        font-size:40px !important;
        line-height:0.96 !important;
      }

      .hero-cta{
        width:100% !important;
        max-width:520px !important;
        min-height:88px !important;
        font-size:2.2rem !important;
        margin-top:34px !important;
      }
    }

    @media (max-width: 767px){
      .header-inner{
        width:calc(100% - 24px) !important;
        min-height:82px !important;
      }

      .brand-logo{
        width:56px !important;
      }

      .header-cta{
        min-width:210px !important;
        min-height:54px !important;
        padding:0 18px !important;
        font-size:1.25rem !important;
      }

      .whatsapp-icon{
        width:22px !important;
        height:22px !important;
      }

      .hero-content{
        width:calc(100% - 24px) !important;
        padding-top:118px !important;
        padding-bottom:22px !important;
      }

      .hero-card{
        width:100% !important;
        padding:34px 22px 30px !important;
        border-radius:22px !important;
      }

      .hero-card h1{
        font-size:30px !important;
        line-height:0.98 !important;
      }

      .hero-cta{
        width:100% !important;
        min-height:74px !important;
        font-size:1.7rem !important;
        margin-top:26px !important;
        padding:0 16px !important;
      }
    }
  </style>
</head>
<body>
  <header class="site-header" id="topo">
    <div
      class="header-inner"
      style="
        width:min(100% - 48px, 1380px);
        margin:0 auto;
        min-height:96px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:20px;
      "
    >
      <a
        href="#topo"
        class="brand"
        aria-label="AJF Automáticos - Início"
        style="display:flex; align-items:center; flex:0 0 auto;"
      >
        <img
          src="assets/logo.webp"
          alt="Logo AJF Automáticos"
          class="brand-logo"
          style="width:74px; height:auto; object-fit:contain; display:block;"
        />
      </a>

      <nav
        class="desktop-nav"
        aria-label="Menu principal"
        style="
          display:flex;
          align-items:center;
          justify-content:center;
          gap:34px;
          flex:1 1 auto;
          margin:0;
        "
      >
        <a href="#home" class="active">Home</a>
        <a href="#sobre">Sobre Nós</a>
        <a href="#servicos">Serviços</a>
        <a href="#cases">Cases de Sucesso</a>
      </nav>

      <div
        class="header-actions"
        style="
          display:flex;
          align-items:center;
          gap:16px;
          flex:0 0 auto;
        "
      >
        <a
          href="https://wa.me/5544999999999?text=Ol%C3%A1%2C%20quero%20agendar%20minha%20revis%C3%A3o."
          class="contact-button header-cta"
          aria-label="Entrar em contato pelo WhatsApp"
          style="
            min-width:290px;
            min-height:68px;
            padding:0 28px;
            font-size:1.8rem;
          "
        >
          <span>Entra em Contato</span>
          <img
            src="assets/whatsapp-icon.webp"
            alt="WhatsApp"
            class="whatsapp-icon"
            style="width:28px; height:28px;"
          />
        </a>

        <button
          class="menu-toggle"
          id="menuToggle"
          aria-label="Abrir menu"
          aria-expanded="false"
          aria-controls="mobileMenu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <nav class="mobile-nav" aria-label="Menu mobile">
        <a href="#home">Home</a>
        <a href="#sobre">Sobre Nós</a>
        <a href="#servicos">Serviços</a>
        <a href="#cases">Cases de Sucesso</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" id="home">
      <picture class="hero-bg">
        <source media="(max-width: 767px)" srcset="assets/hero-mobile.webp" />
        <img src="assets/hero-desktop.webp" alt="Carro esportivo verde em ambiente urbano noturno" />
      </picture>

      <div class="hero-overlay"></div>

      <div
        class="hero-content"
        style="
          width:min(100% - 48px, 1380px);
          margin:0 auto;
          min-height:calc(100vh - 96px);
          padding-top:120px;
          padding-bottom:40px;
          position:relative;
          z-index:2;
          display:flex;
          align-items:center;
          justify-content:flex-start;
        "
      >
        <div
          class="hero-card"
          style="
            width:min(56vw, 860px);
            min-height:520px;
            margin-left:0;
            margin-top:0;
            padding:58px 44px 50px;
            border-radius:26px;
          "
        >
          <h1
            style="
              max-width:700px;
              font-size:56px;
              line-height:0.95;
              letter-spacing:0;
              text-transform:uppercase;
              margin:0;
            "
          >
            ESPECIALISTAS EM <span>CÂMBIO AUTOMÁTICO</span><br>
            AUTOMOTIVA EM MARINGÁ E REGIÃO!
          </h1>

          <a
            href="https://wa.me/5544999999999?text=Ol%C3%A1%2C%20quero%20agendar%20minha%20revis%C3%A3o."
            class="contact-button hero-cta"
            aria-label="Agendar revisão agora"
            style="
              margin-top:46px;
              width:min(100%, 610px);
              min-height:104px;
              font-size:2.8rem;
              padding:0 28px;
            "
          >
            <span>AGENDA SUA REVISÃO AGORA</span>
          </a>
        </div>
      </div>
    </section>

    <section id="sobre" class="spacer-section" aria-hidden="true"></section>
    <section id="servicos" class="spacer-section" aria-hidden="true"></section>
    <section id="cases" class="spacer-section" aria-hidden="true"></section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
