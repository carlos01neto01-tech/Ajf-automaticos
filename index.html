<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AJF Automáticos | Câmbio Automático em Maringá</title>

<link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&display=swap" rel="stylesheet" />

<style>

/* ================= BASE ================= */
:root{
  --neon:#19f000;
  --text:#ffffff;
  --container:1400px;

  /* ESCALA TIPOGRÁFICA CORRIGIDA */
  --fs-title-xl: clamp(32px, 4vw, 56px);
  --fs-title-lg: clamp(26px, 3vw, 42px);
  --fs-title-md: clamp(20px, 2vw, 28px);
  --fs-text: clamp(14px, 1.2vw, 18px);
  --fs-btn: clamp(14px, 1.5vw, 20px);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:"Teko", sans-serif;
  background:#000;
  color:#fff;
}

/* ================= HEADER ================= */
header{
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,.7);
  padding:16px 0;
}

.container{
  width:90%;
  max-width:var(--container);
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

nav a{
  margin:0 15px;
  text-decoration:none;
  color:#fff;
  font-size:var(--fs-text);
}

.btn{
  background:var(--neon);
  color:#000;
  padding:12px 22px;
  border-radius:30px;
  text-decoration:none;
  font-size:var(--fs-btn);
}

/* ================= HERO ================= */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding-top:80px;
}

.hero h1{
  font-size:var(--fs-title-xl);
}

.hero span{
  color:var(--neon);
}

.hero a{
  display:inline-block;
  margin-top:30px;
}

/* ================= CARDS ================= */
.cards{
  padding:80px 0;
  background:#111;
  text-align:center;
}

.cards h2{
  font-size:var(--fs-title-lg);
  margin-bottom:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.card{
  background:#000;
  padding:30px;
  border:1px solid var(--neon);
  border-radius:20px;
}

.card h3{
  font-size:var(--fs-title-md);
}

.card p{
  font-size:var(--fs-text);
  margin-top:10px;
}

/* ================= FORM ================= */
.form{
  padding:80px 0;
  background:#ececec;
  color:#000;
  text-align:center;
}

.form h2{
  font-size:var(--fs-title-xl);
}

.form input{
  width:100%;
  max-width:400px;
  height:60px;
  margin:10px;
  padding:10px;
  font-size:var(--fs-text);
}

.form button{
  height:60px;
  font-size:var(--fs-title-md);
  background:#000;
  color:var(--neon);
  border:none;
}

/* ================= FOOTER ================= */
footer{
  background:#000;
  padding:40px;
  text-align:center;
}

footer p{
  font-size:var(--fs-text);
}

</style>
</head>

<body>

<header>
  <div class="container">
    <h2>AJF</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#">Serviços</a>
      <a href="#">Contato</a>
    </nav>
    <a href="#" class="btn">WhatsApp</a>
  </div>
</header>

<section class="hero">
  <div>
    <h1>
      ESPECIALISTAS EM <span>CÂMBIO AUTOMÁTICO</span>
    </h1>
    <a href="#" class="btn">Agendar Revisão</a>
  </div>
</section>

<section class="cards">
  <h2>NOSSOS SERVIÇOS</h2>

  <div class="container grid">
    <div class="card">
      <h3>Diagnóstico</h3>
      <p>Diagnóstico completo do câmbio automático.</p>
    </div>

    <div class="card">
      <h3>Revisão</h3>
      <p>Manutenção preventiva profissional.</p>
    </div>

    <div class="card">
      <h3>Reparo</h3>
      <p>Correção de falhas e problemas.</p>
    </div>
  </div>
</section>

<section class="form">
  <h2>ENTRE EM CONTATO</h2>

  <form>
    <input type="text" placeholder="Nome">
    <input type="email" placeholder="Email">
    <input type="tel" placeholder="Telefone">
    <br>
    <button>Enviar</button>
  </form>
</section>

<footer>
  <p>© 2025 AJF Automáticos</p>
</footer>

</body>
</html>
