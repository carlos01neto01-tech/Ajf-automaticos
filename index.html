<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJF</title>

<link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:"Teko", sans-serif;
  background:#000;
  overflow-x:hidden;
}

/* HERO */

.hero{
  height:100vh;
  position:relative;
}

.hero img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CARD */

.hero-card{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  left:5%;
  width:55%;
  padding:40px;
  border-radius:30px;
  border:2px solid #19f000;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* TITULO DESKTOP */

.hero-title{
  font-size:60px;
  line-height:.9;
  color:#fff;
}

.hero-title span{
  color:#19f000;
}

/* BOTAO */

.hero-btn{
  margin-top:40px;
  background:linear-gradient(135deg,#23ff00,#0ccd00);
  border-radius:100px;
  padding:25px;
  text-align:center;
  font-size:28px;
  color:#000;
  font-weight:600;
}

/* MOBILE */

@media(max-width:768px){

.hero-card{
  width:90%;
  left:50%;
  transform:translate(-50%,0);
  top:140px;
  padding:40px 25px;
  min-height:600px;
  justify-content:flex-start;
  align-items:center;
}

/* AQUI FOI O AJUSTE REAL */

.hero-title{
  font-size:52px;   /* aumentado */
  line-height:.88;
  text-align:center;
  margin-bottom:30px; /* encosta no botão */
}

.hero-btn{
  width:100%;
  font-size:22px;
}

}

</style>
</head>

<body>

<section class="hero">
  <img src="assets/hero-desktop.webp">

  <div class="hero-card">

    <div class="hero-title">
      ESPECIALISTAS EM <span>CÂMBIO AUTOMÁTICO</span><br>
      AUTOMOTIVA EM MARINGÁ E REGIÃO!
    </div>

    <div class="hero-btn">
      AGENDA SUA REVISÃO AGORA
    </div>

  </div>

</section>

</body>
</html>
