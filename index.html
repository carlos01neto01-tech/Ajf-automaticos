<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJF Automáticos | Câmbio Automático em Maringá</title>
  <meta name="description" content="Especialistas em câmbio automático automotiva em Maringá e região." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header" id="topo">
    <div
      class="header-inner"
      style="
        width:min(100% - 40px, 1520px);
        margin:0 auto;
        min-height:114px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:28px;
      "
    >
      <a
        href="#topo"
        class="brand"
        aria-label="AJF Automáticos - Início"
        style="display:flex; align-items:center; flex:0 0 auto;"
      >
        <img
          src="assets/logo.webp"
          alt="Logo AJF Automáticos"
          class="brand-logo"
          style="width:88px; height:auto; object-fit:contain;"
        />
      </a>

      <nav
        class="desktop-nav"
        aria-label="Menu principal"
        style="
          display:flex;
          align-items:center;
          justify-content:center;
          gap:42px;
          flex:1 1 auto;
          margin:0;
        "
      >
        <a href="#home" class="active">Home</a>
        <a href="#sobre">Sobre Nós</a>
        <a href="#servicos">Serviços</a>
        <a href="#cases">Cases de Sucesso</a>
      </nav>

      <div
        class="header-actions"
        style="
          display:flex;
          align-items:center;
          gap:18px;
          flex:0 0 auto;
        "
      >
        <a
          href="https://wa.me/5544999999999?text=Ol%C3%A1%2C%20quero%20agendar%20minha%20revis%C3%A3o."
          class="contact-button header-cta"
          aria-label="Entrar em contato pelo WhatsApp"
          style="
            min-width:320px;
            min-height:72px;
            padding:0 34px;
            font-size:2rem;
          "
        >
          <span>Entra em Contato</span>
          <img
            src="assets/whatsapp-icon.webp"
            alt="WhatsApp"
            class="whatsapp-icon"
            style="width:30px; height:30px;"
          />
        </a>

        <button
          class="menu-toggle"
          id="menuToggle"
          aria-label="Abrir menu"
          aria-expanded="false"
          aria-controls="mobileMenu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <nav class="mobile-nav" aria-label="Menu mobile">
        <a href="#home">Home</a>
        <a href="#sobre">Sobre Nós</a>
        <a href="#servicos">Serviços</a>
        <a href="#cases">Cases de Sucesso</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" id="home">
      <picture class="hero-bg">
        <source media="(max-width: 767px)" srcset="assets/hero-mobile.webp" />
        <img src="assets/hero-desktop.webp" alt="Carro esportivo verde em ambiente urbano noturno" />
      </picture>

      <div class="hero-overlay"></div>

      <div
        class="hero-content"
        style="
          width:min(100% - 40px, 1520px);
          margin:0 auto;
          padding-top:170px;
          position:relative;
          z-index:2;
          display:flex;
          align-items:flex-start;
          justify-content:flex-start;
        "
      >
        <div
          class="hero-card"
          style="
            width:min(58vw, 980px);
            min-height:620px;
            margin-left:40px;
            margin-top:10px;
            padding:82px 54px 64px;
            border-radius:30px;
          "
        >
          <h1
            style="
              max-width:760px;
              font-size:62px;
              line-height:0.95;
              letter-spacing:0.01em;
              text-transform:uppercase;
            "
          >
            ESPECIALISTAS EM <span>CÂMBIO AUTOMÁTICO</span><br>
            AUTOMOTIVA EM MARINGÁ E REGIÃO!
          </h1>

          <a
            href="https://wa.me/5544999999999?text=Ol%C3%A1%2C%20quero%20agendar%20minha%20revis%C3%A3o."
            class="contact-button hero-cta"
            aria-label="Agendar revisão agora"
            style="
              margin-top:62px;
              width:min(100%, 700px);
              min-height:118px;
              font-size:3.2rem;
              padding:0 34px;
            "
          >
            <span>AGENDA SUA REVISÃO AGORA</span>
          </a>
        </div>
      </div>
    </section>

    <section id="sobre" class="spacer-section" aria-hidden="true"></section>
    <section id="servicos" class="spacer-section" aria-hidden="true"></section>
    <section id="cases" class="spacer-section" aria-hidden="true"></section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
